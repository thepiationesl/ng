<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Group Chat World</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-message-user: #0f3460;
      --bg-message-agent: #1a1a2e;
      --text-primary: #eee;
      --text-secondary: #aaa;
      --accent: #e94560;
      --border: #333;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--bg-secondary);
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 1.3rem;
      font-weight: 600;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
    }

    .status-dot.disconnected {
      background: #f44336;
    }

    /* Main chat area */
    .chat-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 250px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      padding: 1rem;
      overflow-y: auto;
    }

    .sidebar h3 {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .agent-card {
      background: var(--bg-primary);
      border-radius: 8px;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
      border: 1px solid var(--border);
    }

    .agent-name {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .agent-status {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .agent-emotion {
      display: flex;
      gap: 0.25rem;
      margin-top: 0.5rem;
    }

    .emotion-bar {
      flex: 1;
      height: 4px;
      background: #333;
      border-radius: 2px;
      overflow: hidden;
    }

    .emotion-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s;
    }

    .messages-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      max-width: 70%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: var(--bg-message-user);
      border-bottom-right-radius: 4px;
    }

    .message.agent {
      align-self: flex-start;
      background: var(--bg-message-agent);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .message-sender {
      font-weight: 600;
      color: var(--accent);
    }

    .message-content {
      line-height: 1.5;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 0.5rem 1rem;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: bounce 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }

    /* Input area */
    .input-area {
      padding: 1rem 1.5rem;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
    }

    .input-area input {
      flex: 1;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: var(--accent);
    }

    .input-area button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .input-area button:hover {
      opacity: 0.9;
    }

    .input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      .message {
        max-width: 85%;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌍 AI Group Chat World</h1>
    <div class="status-indicator">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connected</span>
    </div>
  </div>

  <div class="chat-container">
    <div class="sidebar">
      <h3>Agents</h3>
      <div id="agentsList"></div>
      
      <h3 style="margin-top: 1.5rem;">⚙️ Settings</h3>
      <button id="settingsBtn" style="width: 100%; padding: 0.5rem; background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 6px; cursor: pointer; margin-bottom: 0.5rem;">Open Settings Panel</button>
      
      <h3 style="margin-top: 1.5rem;">🛠️ Admin</h3>
      <button id="resetBtn" style="width: 100%; padding: 0.5rem; background: #c62828; border: none; color: white; border-radius: 6px; cursor: pointer;">Reset World</button>
    </div>

    <div class="messages-area">
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <input 
          type="text" 
          id="messageInput" 
          placeholder="Type a message..." 
          autocomplete="off"
        >
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: var(--bg-secondary); border-radius: 12px; padding: 2rem; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h2 style="font-size: 1.5rem;">World Settings</h2>
        <button id="closeSettingsBtn" style="background: none; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer;">&times;</button>
      </div>

      <div style="margin-bottom: 1.5rem;">
        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Chaos Level: <span id="chaosValue">0.5</span></label>
        <input type="range" id="chaosSlider" min="0" max="1" step="0.05" value="0.5" style="width: 100%;">
        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem;">Controls randomness and unpredictability of AI behavior</p>
      </div>

      <div style="margin-bottom: 1.5rem;">
        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Base Temperature: <span id="tempValue">0.7</span></label>
        <input type="range" id="tempSlider" min="0.1" max="2" step="0.1" value="0.7" style="width: 100%;">
        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem;">Higher = more creative, Lower = more focused</p>
      </div>

      <div style="margin-bottom: 1.5rem;">
        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Auto-Speak Interval (ms)</label>
        <input type="number" id="intervalInput" value="5000" step="1000" min="1000" style="width: 100%; padding: 0.5rem; background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 6px;">
        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem;">How often agents spontaneously speak</p>
      </div>

      <div style="margin-bottom: 1.5rem;">
        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
          <input type="checkbox" id="toolUseCheckbox" checked>
          <span style="font-weight: 600;">Allow Tool Usage</span>
        </label>
        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem;">Let agents use web search, calculator, memory, etc.</p>
      </div>

      <button id="saveSettingsBtn" style="width: 100%; padding: 0.75rem; background: var(--accent); border: none; color: white; border-radius: 8px; font-size: 1rem; cursor: pointer;">Save Settings</button>
    </div>
  </div>

  <!-- Agent Editor Modal -->
  <div id="agentModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: var(--bg-secondary); border-radius: 12px; padding: 2rem; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h2 style="font-size: 1.5rem;" id="agentModalTitle">Edit Agent</h2>
        <button class="closeAgentBtn" style="background: none; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer;">&times;</button>
      </div>

      <form id="agentForm">
        <input type="hidden" id="editAgentId">
        
        <div style="margin-bottom: 1rem;">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Name</label>
          <input type="text" id="agentName" required style="width: 100%; padding: 0.5rem; background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 6px;">
        </div>

        <div style="margin-bottom: 1rem;">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">System Prompt (Personality)</label>
          <textarea id="agentSystemPrompt" rows="4" required style="width: 100%; padding: 0.5rem; background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 6px; resize: vertical;"></textarea>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Speaking Style</label>
            <select id="agentSpeakingStyle" style="width: 100%; padding: 0.5rem; background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 6px;">
              <option value="casual">Casual</option>
              <option value="formal">Formal</option>
              <option value="expressive">Expressive</option>
              <option value="neutral">Neutral</option>
            </select>
          </div>
          
          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Activity Level</label>
            <input type="number" id="agentActivityLevel" min="0" max="1" step="0.1" value="0.5" style="width: 100%; padding: 0.5rem; background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 6px;">
          </div>
        </div>

        <div style="margin-bottom: 1rem;">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Model</label>
          <input type="text" id="agentModel" placeholder="e.g., gpt-3.5-turbo" style="width: 100%; padding: 0.5rem; background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 6px;">
        </div>

        <div style="display: flex; gap: 1rem;">
          <button type="submit" style="flex: 1; padding: 0.75rem; background: var(--accent); border: none; color: white; border-radius: 8px; font-size: 1rem; cursor: pointer;">Save Agent</button>
          <button type="button" id="deleteAgentBtn" style="flex: 1; padding: 0.75rem; background: #c62828; border: none; color: white; border-radius: 8px; font-size: 1rem; cursor: pointer;">Delete</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // State
    let ws = null;
    let agents = {};
    let messages = [];
    let isConnected = false;

    // DOM elements
    const messagesEl = document.getElementById('messages');
    const agentsListEl = document.getElementById('agentsList');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    // Initialize WebSocket
    function connect() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${window.location.host}/ws`;
      
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        isConnected = true;
        updateStatus(true);
      };

      ws.onclose = () => {
        isConnected = false;
        updateStatus(false);
        setTimeout(connect, 3000);
      };

      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
        updateStatus(false);
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleMessage(data);
      };
    }

    function updateStatus(connected) {
      statusDot.classList.toggle('disconnected', !connected);
      statusText.textContent = connected ? 'Connected' : 'Disconnected';
    }

    function handleMessage(data) {
      switch (data.type) {
        case 'history':
          messages = data.messages;
          renderMessages();
          break;

        case 'message':
          messages.push(data.message);
          if (messages.length > 100) messages.shift();
          appendMessage(data.message);
          scrollToBottom();
          break;

        case 'agents':
          agents = data.agents.reduce((acc, agent) => {
            acc[agent.id] = agent;
            return acc;
          }, {});
          renderAgents();
          break;

        case 'typing':
          agents = data.agents.reduce((acc, agent) => {
            acc[agent.id] = agent;
            return acc;
          }, {});
          renderAgents();
          break;
      }
    }

    function renderMessages() {
      messagesEl.innerHTML = '';
      messages.forEach(msg => appendMessage(msg, false));
      scrollToBottom();
    }

    function appendMessage(msg, animate = true) {
      const isUser = msg.sender_type === 'user';
      const senderName = isUser ? 'You' : (agents[msg.sender_id]?.name || msg.sender_id);
      
      const msgEl = document.createElement('div');
      msgEl.className = `message ${isUser ? 'user' : 'agent'}`;
      
      const time = new Date(msg.timestamp).toLocaleTimeString([], { 
        hour: '2-digit', 
        minute: '2-digit' 
      });

      msgEl.innerHTML = `
        <div class="message-header">
          <span class="message-sender">${senderName}</span>
          <span>${time}</span>
        </div>
        <div class="message-content">${escapeHtml(msg.content)}</div>
      `;

      messagesEl.appendChild(msgEl);
    }

    function renderAgents() {
      agentsListEl.innerHTML = '';
      
      Object.values(agents).forEach(agent => {
        const card = document.createElement('div');
        card.className = 'agent-card';
        
        const typingStatus = agent.isTyping ? '✏️ Typing...' : 'Idle';
        
        card.innerHTML = `
          <div class="agent-name">${agent.name}</div>
          <div class="agent-status">${typingStatus}</div>
          <div class="agent-emotion">
            <div class="emotion-bar" title="Positivity">
              <div class="emotion-fill" style="width: ${(agent.emotionState?.valence || 0.5) * 100}%"></div>
            </div>
            <div class="emotion-bar" title="Energy">
              <div class="emotion-fill" style="width: ${(agent.emotionState?.arousal || 0.5) * 100}%"></div>
            </div>
          </div>
        `;
        
        agentsListEl.appendChild(card);
      });
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function sendMessage() {
      const content = messageInput.value.trim();
      if (!content || !isConnected) return;

      messageInput.value = '';
      sendBtn.disabled = true;

      try {
        await fetch('/api/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content })
        });
      } catch (error) {
        console.error('Failed to send message:', error);
      } finally {
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    // Event listeners
    sendBtn.addEventListener('click', sendMessage);
    
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Load initial agents
    async function loadAgents() {
      try {
        const res = await fetch('/api/agents');
        const data = await res.json();
        agents = data.agents.reduce((acc, agent) => {
          acc[agent.id] = agent;
          return acc;
        }, {});
        renderAgents();
      } catch (error) {
        console.error('Failed to load agents:', error);
      }
    }

    // Initialize
    loadAgents();
    connect();
  </script>
</body>
</html>
