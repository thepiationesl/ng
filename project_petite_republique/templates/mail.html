<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮件系统 - Project Petite République</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff00;
            line-height: 1.6;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }
        h1 { font-size: 1.8em; }
        .back-link { color: #00ff00; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        
        .mail-interface {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }
        
        .compose-panel, .inbox-panel {
            background: #111;
            border: 1px solid #333;
            padding: 20px;
        }
        
        h2 {
            font-size: 1.3em;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #888; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            background: #0a0a0a;
            border: 1px solid #333;
            color: #00ff00;
            font-family: inherit;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #00ff00;
        }
        textarea { min-height: 150px; resize: vertical; }
        
        .send-btn {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 12px 25px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            width: 100%;
        }
        .send-btn:hover { background: #00cc00; }
        .send-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        
        .email-list { list-style: none; }
        .email-item {
            padding: 15px;
            margin: 10px 0;
            background: #0a0a0a;
            border: 1px solid #333;
            cursor: pointer;
        }
        .email-item:hover { border-color: #00ff00; }
        .email-subject { font-weight: bold; margin-bottom: 5px; }
        .email-meta { font-size: 0.8em; color: #666; }
        
        .status-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 3px;
            display: none;
        }
        .status-message.success { background: #003300; border: 1px solid #00ff00; display: block; }
        .status-message.error { background: #330000; border: 1px solid #ff0000; display: block; }
        
        .bandwidth-warning {
            background: #332200;
            border: 1px solid #ffff00;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
        
        @media (max-width: 768px) {
            .mail-interface { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📧 Telnet 邮件系统</h1>
            <a href="/" class="back-link">← 返回主页</a>
        </header>

        <div class="bandwidth-warning">
            ⚠️ 注意：Koltu 共和国国际带宽仅 64kbps，邮件发送可能需要较长时间。对方使用 Windows 3.1 系统，可能出现乱码。
        </div>

        <div class="mail-interface">
            <div class="compose-panel">
                <h2>✉️ 撰写邮件</h2>
                <form id="mailForm">
                    <div class="form-group">
                        <label for="recipient">收件人</label>
                        <select id="recipient" name="recipient">
                            <option value="president">Artu 总统</option>
                            <option value="secretary">总统秘书</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="subject">主题</label>
                        <input type="text" id="subject" name="subject" placeholder="邮件主题">
                    </div>
                    
                    <div class="form-group">
                        <label for="content">内容</label>
                        <textarea id="content" name="content" placeholder="请输入邮件内容..."></textarea>
                    </div>
                    
                    <button type="submit" class="send-btn" id="sendBtn">📮 发送邮件</button>
                </form>
                
                <div id="statusMessage" class="status-message"></div>
            </div>
            
            <div class="inbox-panel">
                <h2>📥 收件箱</h2>
                <ul id="emailList" class="email-list">
                    <li style="text-align: center; color: #666; padding: 40px;">加载中...</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const mailForm = document.getElementById('mailForm');
        const statusMessage = document.getElementById('statusMessage');
        const emailList = document.getElementById('emailList');
        const sendBtn = document.getElementById('sendBtn');

        // 发送邮件
        mailForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                recipient: document.getElementById('recipient').value,
                subject: document.getElementById('subject').value || '(无主题)',
                content: document.getElementById('content').value
            };
            
            if (!formData.content.trim()) {
                showStatus('邮件内容不能为空', 'error');
                return;
            }
            
            sendBtn.disabled = true;
            sendBtn.textContent = '⏳ 发送中...';
            
            try {
                const response = await fetch('/api/mail/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showStatus('✅ 邮件已发送！总统办公室正在处理...', 'success');
                    mailForm.reset();
                    loadInbox(); // 刷新收件箱
                } else {
                    showStatus(`❌ 发送失败：${data.error}`, 'error');
                }
            } catch (e) {
                showStatus(`❌ 发送失败：${e.message}`, 'error');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '📮 发送邮件';
            }
        });

        // 显示状态消息
        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = `status-message ${type}`;
            setTimeout(() => {
                statusMessage.style.display = 'none';
            }, 5000);
        }

        // 加载收件箱
        async function loadInbox() {
            try {
                const response = await fetch('/api/mail/inbox');
                const data = await response.json();
                
                if (data.success && data.emails.length > 0) {
                    emailList.innerHTML = data.emails.map(email => `
                        <li class="email-item">
                            <div class="email-subject">${escapeHtml(email.title)}</div>
                            <div class="email-meta">
                                来自：${escapeHtml(email.source)} | 
                                时间：${new Date(email.timestamp).toLocaleString()} | 
                                优先级：${email.priority}
                            </div>
                            <div style="margin-top: 10px; color: #888;">${escapeHtml(email.content.substring(0, 100))}${email.content.length > 100 ? '...' : ''}</div>
                        </li>
                    `).join('');
                } else {
                    emailList.innerHTML = '<li style="text-align: center; color: #666; padding: 40px;">收件箱为空</li>';
                }
            } catch (e) {
                emailList.innerHTML = `<li style="text-align: center; color: #ff0000; padding: 40px;">加载失败：${e.message}</li>`;
            }
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 初始加载
        loadInbox();
        
        // 定期刷新
        setInterval(loadInbox, 60000); // 每 1 分钟刷新
    </script>
</body>
</html>
